name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements/dev.txt
    - name: Run Ruff lint
      run: ruff check .
    - name: Run Ruff format check
      run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements/dev.txt
    - name: Run tests
      run: python -m pytest --ignore=scripts/ --cov=apps --cov-report=xml
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml

  django-checks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements/dev.txt
    - name: Run Django checks
      env:
        DJANGO_SETTINGS_MODULE: config.settings.prod
        SECRET_KEY: ci-secret-key-not-for-production
        ALLOWED_HOSTS: localhost
        DB_NAME: ci_db
        DB_USER: ci_user
        DB_PASSWORD: ci_password
        DB_HOST: localhost
        DB_PORT: "5432"
        IOL_USERNAME: ci_user
        IOL_PASSWORD: ci_password
      run: python manage.py check --deploy

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit pip-audit
    - name: Run bandit
      run: bandit -r apps/ -ll -q
    - name: Run pip-audit
      run: pip-audit -r requirements/base.txt

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements/dev.txt
    - name: Run migrations check
      run: python manage.py makemigrations --check
