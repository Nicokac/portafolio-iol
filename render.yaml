services:
  - type: web
    name: portafolio-iol
    runtime: python
    buildCommand: pip install -r requirements/prod.txt && python manage.py collectstatic --no-input && python manage.py migrate
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /health/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: IOL_USERNAME
        sync: false
      - key: IOL_PASSWORD
        sync: false
      - key: USDARS_MEP_API_URL
        value: https://dolarapi.com/v1/dolares/bolsa
      - key: USDARS_MEP_API_VALUE_PATH
        value: venta
      - key: USDARS_MEP_API_DATE_PATH
        value: fechaActualizacion
